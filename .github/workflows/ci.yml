name: Build & Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked --group dev
      - run: uv build
      - run: uv run pytest
