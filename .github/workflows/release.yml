name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked --group dev
      - run: uv run pytest
      - run: uv build
      - run: uv publish
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
